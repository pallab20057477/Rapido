version: '3.8'

services:
  # API Gateway
  api:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      - ENV=production
      - DATABASE_URL=postgres://rapido:${DB_PASSWORD}@postgres:5432/rapido?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - JWT_SECRET=${JWT_SECRET}
      # Compatibility envs for viper-based config.Load()
      - DB_USERNAME=rapido
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=rapido
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_PORT=8080
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rapido-network
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # Auth Service
  auth-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: ["./rapido-backend", "service", "auth"]
    environment:
      - SERVICE_NAME=auth
      - PORT=8001
      - DATABASE_URL=postgres://rapido:${DB_PASSWORD}@postgres:5432/rapido?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - DB_USERNAME=rapido
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=rapido
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_PORT=8001
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - rapido-network
    deploy:
      replicas: 2

  # Ride Service
  ride-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: ["./rapido-backend", "service", "ride"]
    environment:
      - SERVICE_NAME=ride
      - PORT=8002
      - DATABASE_URL=postgres://rapido:${DB_PASSWORD}@postgres:5432/rapido?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - DB_USERNAME=rapido
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=rapido
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_PORT=8002
    ports:
      - "8002:8002"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rapido-network
    deploy:
      replicas: 3

  # Driver Service
  driver-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: ["./rapido-backend", "service", "driver"]
    environment:
      - SERVICE_NAME=driver
      - PORT=8003
      - DATABASE_URL=postgres://rapido:${DB_PASSWORD}@postgres:5432/rapido?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - DB_USERNAME=rapido
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=rapido
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_PORT=8003
    ports:
      - "8003:8003"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - rapido-network
    deploy:
      replicas: 2

  # Payment Service
  payment-service:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    command: ["./rapido-backend", "service", "payment"]
    environment:
      - SERVICE_NAME=payment
      - PORT=8004
      - DATABASE_URL=postgres://rapido:${DB_PASSWORD}@postgres:5432/rapido?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - DB_USERNAME=rapido
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=rapido
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SERVER_PORT=8004
    ports:
      - "8004:8004"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - rapido-network
    deploy:
      replicas: 2

  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.3-alpine
    environment:
      - POSTGRES_USER=rapido
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=rapido
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - rapido-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rapido"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cluster
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - rapido-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    restart: unless-stopped
    depends_on:
      - zookeeper
    networks:
      - rapido-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped
    networks:
      - rapido-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - rapido-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - rapido-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - rapido-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  rapido-network:
    driver: bridge
